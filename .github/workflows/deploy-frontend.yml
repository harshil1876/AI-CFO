name: Deploy Frontend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'ai-cfo-frontend/**'
      - '.github/workflows/deploy-frontend.yml'

env:
  AZURE_WEBAPP_NAME: ai-cfo-frontend
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai-cfo-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './ai-cfo-frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: dummy-key-for-build
          NEXT_PUBLIC_API_URL: dummy-url-for-build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: './ai-cfo-frontend'
