version: '3.8'

services:
  frontend:
    build: 
      context: ./ai-cfo-frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend

  backend:
    build: 
      context: ./ai-cfo-backend
      dockerfile: ../Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ./ai-cfo-backend/.env
    # Optionally mount volumes for hot reloading in local dev
    # volumes:
    #   - ./ai-cfo-backend:/app

  # Celery worker process
  celery_worker:
    build: 
      context: ./ai-cfo-backend
      dockerfile: ../Dockerfile.backend
    command: celery -A backend worker --loglevel=info
    env_file:
      - ./ai-cfo-backend/.env
    depends_on:
      - backend
